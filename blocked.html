<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blocked — Focus Tools</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 500px;
      padding: 40px;
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 28px; margin-bottom: 12px; color: #fff; }
    p { font-size: 16px; color: #aaa; line-height: 1.6; }
    .quote {
      margin-top: 30px;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      font-style: italic;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🧠</div>
    <h1>This site is blocked</h1>
    <p>Focus Tools is keeping you on track. This site is on your blocklist.</p>
    <div class="quote">
      <span id="quoteText"></span>
      <span id="quoteSource" style="display:block;margin-top:8px;font-style:normal;font-size:13px;color:#888;"></span>
    </div>
  </div>
  <script src="quotes.js"></script>
</body>
</html>
